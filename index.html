<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Moto BMW Canvas</title>

  <!-- Favicon -->
  <link rel="icon" href="assets/img/favicon.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Estilos propios -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="bg-light">

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-dark bg-dark shadow">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">Moto BMW Canvas 2D</span>
    <span class="text-white">Programador: Juan Pablo Hernández</span>
  </div>
</nav>

<!-- ===== CONTENIDO ===== -->
<div class="container my-5">

  <div class="row g-4">

    <!-- IZQUIERDA: CANVAS -->
    <div class="col-md-6 text-center d-flex flex-column align-items-center">
      
      <h5 class="mb-3">Dibujo por programación</h5>

      <div class="p-4 bg-white rounded shadow">
        <canvas id="motoCanvas" width="650" height="330"></canvas>
      </div>

    </div>

    <!-- DERECHA: IMAGEN ORIGINAL -->
    <div class="col-md-6 text-center d-flex flex-column align-items-center">
      
      <h5 class="mb-3">Imagen original</h5>

      <div class="p-4 bg-white rounded shadow">
        <img src="assets/img/imagen.jpg" class="img-fluid rounded">
      </div>

    </div>

  </div>

</div>

<!-- ===== FOOTER ===== -->
<footer class="bg-dark text-white text-center py-3 shadow mt-5">
  <p class="mb-1">Graficación por Computadora — Canvas 2D</p>
  <p class="mb-0">Juan Pablo Hernández | 2026</p>
</footer>

<script src="assets/js/main.js"></script>

</body>
</html>
